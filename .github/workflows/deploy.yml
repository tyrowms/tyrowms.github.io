name: Build & Deploy to tyrowms.github.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_AZURE_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.VITE_AZURE_TENANT_ID }}
          VITE_DATAVERSE_URL: ${{ secrets.VITE_DATAVERSE_URL }}
          VITE_DATAVERSE_ENTITY: ${{ secrets.VITE_DATAVERSE_ENTITY }}

      - name: Deploy to tyrowms.github.io
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M:%S UTC') from ${{ github.sha }}"
          git push -f https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/tyrowms/tyrowms.github.io.git main
